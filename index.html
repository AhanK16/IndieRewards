<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndieRewards Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <main id="home-page" class="view">
            <header>
                <img src="logo.png" alt="IndieRewards Logo" id="app-logo">
                <h1>IndieRewards</h1>
                <p class="tagline">Local Love, Pooled Perks.</p>
            </header>
            <section class="reward-card">
                <h3>Your Digital Stamp Card</h3>
                <div class="stamps-grid" id="stampsGrid"></div>
                <button id="scanBtn" class="primary-btn">Scan QR Code</button>
            </section>
        </main>

        <main id="explore-page" class="view hidden">
            <header class="explore-header">
                <h2>Find Local Gems</h2>
                <div class="view-toggle">
                    <button id="list-toggle" class="toggle-btn active" onclick="setExploreView('list')">List View</button>
                    <button id="map-toggle" class="toggle-btn" onclick="setExploreView('map')">Map View</button>
                </div>
            </header>

            <section id="list-container" class="sub-view">
                <div id="location-list"></div>
            </section>

            <section id="map-container" class="sub-view hidden">
                <div class="mock-map">
                    <div class="map-pin pin-1"><img src="logo.png"></div>
                    <div class="map-pin pin-2"><img src="logo.png"></div>
                    <div class="map-pin pin-3"><img src="logo.png"></div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" id="nav-home" onclick="navigateTo('home')">Home</button>
            <button class="nav-item" id="nav-explore" onclick="navigateTo('explore')">Explore</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
