<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndieRewards Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-placeholder">
                <img src="Indierewards1.png" alt="IndieRewards Logo" id="app-logo">
            </div>
            <h1>IndieRewards</h1>
            <p class="tagline">Local Love, Pooled Perks.</p>
        </header>

        <main>
            <section class="reward-card">
                <h3>Your Digital Stamp Card</h3>
                <p>Buy 10 drinks, get 1 free at a random local gem!</p>
                <div class="stamps-grid" id="stampsGrid">
                    </div>
                <button id="scanBtn" class="primary-btn">Scan QR Code</button>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active">Home</button>
            <button class="nav-item">Map</button>
            <button class="nav-item">Account</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
