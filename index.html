<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndieRewards Prototype</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 id="view-title">IndieRewards</h1>
        </header>

        <main id="home-view" class="view">
            <div class="logo-placeholder">
                <img src="logo.png" alt="IndieRewards Logo" id="app-logo">
            </div>
            <p class="tagline">Local Love, Pooled Perks.</p>
            <section class="reward-card">
                <h3>Your Digital Stamp Card</h3>
                <div class="stamps-grid" id="stampsGrid"></div>
                <button id="scanBtn" class="primary-btn">Scan QR Code</button>
            </section>
        </main>

        <main id="map-view" class="view hidden">
            <div class="map-placeholder">
                <div class="map-controls">
                    <button onclick="toggleSubView('map')">Map</button>
                    <button onclick="toggleSubView('list')">List</button>
                </div>
                <div id="visual-map" class="sub-view">
                    <div class="map-pin pin-1"><img src="logo.png" width="30"></div>
                    <div class="map-pin pin-2"><img src="logo.png" width="30"></div>
                    <div class="map-pin pin-3"><img src="logo.png" width="30"></div>
                </div>
                <div id="visual-list" class="sub-view hidden">
                    <div id="location-list"></div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchView('home')">Home</button>
            <button class="nav-item" onclick="switchView('map')">Explore</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
